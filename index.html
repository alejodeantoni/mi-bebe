    <style>
        :root {
            --primary: #FF9EAA; --primary-dark: #FF6B7D; --secondary: #89CFF0; 
            --text: #5D5D5D; --bg: #FFF0F5; --white: #FFFFFF;
            --shadow: 0 8px 20px rgba(255, 107, 125, 0.15); 
            --admin-bg: #fff5f6; --admin-border: #FFC0CB;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--white); padding: 1.5rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { margin: 0; color: var(--primary-dark); }
        main { flex: 1; max-width: 600px; margin: 20px auto; width: 100%; padding: 0 15px; }
        .card { background: var(--white); border-radius: 15px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; text-align: center; }
        input[type="date"], input[type="text"], input[type="password"] { padding: 15px; width: 100%; border: 2px solid #eee; border-radius: 10px; margin-bottom: 15px; font-size: 1rem; box-sizing: border-box; }
        button.btn { background: var(--primary-dark); color: white; border: none; padding: 15px; width: 100%; border-radius: 25px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        button.btn:hover { opacity: 0.9; }
        
        .info-box { background: linear-gradient(135deg, var(--primary), #FFB3C1); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .countdown-box { background: linear-gradient(135deg, #89CFF0, #4682B4); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .big-number { font-size: 2.5rem; font-weight: 800; line-height: 1; }
        .label { font-size: 0.9rem; text-transform: uppercase; opacity: 0.9; letter-spacing: 1px; }
        .creator-img { width: 100%; border-radius: 10px; margin-bottom: 15px; object-fit: cover; max-height: 300px; }
        .creator-text { text-align: left; line-height: 1.6; white-space: pre-wrap; }

        .btn-save-cloud { background: #2196F3 !important; margin-top: 10px; }

        .config-area { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
        .hidden { display: none !important; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; margin-top: auto; }

        // --- LÃGICA DE USUARIO ---
        function startApp() {
            const dateVal = document.getElementById('conceptionDate').value;
            const nameVal = document.getElementById('babyName').value;
            if(!dateVal) return alert("Por favor selecciona una fecha.");
            
            state.conception = new Date(dateVal);
            state.babyName = nameVal || "Mi BebÃ©"; calculateStatus();
            document.querySelector('header h1').innerText = `ð¶ ${state.babyName}`;
            document.getElementById('start-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            renderView();

        function calculateStatus() {
            const today = new Date(); today.setHours(0,0,0,0);
            const conceptionDate = new Date(state.conception); conceptionDate.setHours(0,0,0,0);
            const diffTime = today - conceptionDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            let wIndex = Math.floor(diffDays / 7);
            let dIndex = (diffDays % 7) + 1; 
            if(wIndex < 0) { wIndex = 0; dIndex = 1; }
            if(wIndex >= 40) { wIndex = 39; dIndex = 7; }
            state.weekIndex = wIndex; state.day = dIndex;
            const dueDate = new Date(conceptionDate); dueDate.setDate(dueDate.getDate() + 280); 
            const remainingTime = dueDate - today;
            const remainingDays = Math.ceil(remainingTime / (1000 * 60 * 60 * 24));
            let countdownText = "";
            if (remainingDays <= 0) { countdownText = "Â¡Ya es fecha o ha pasado!"; }
            else { let remainingWeeks = Math.floor(remainingDays / 7); let extraDays = remainingDays % 7; countdownText = `${remainingWeeks} Semanas y ${extraDays} DÃ­as`; }
            state.countdownText = countdownText;
        }

            const data = weeksData[state.weekIndex];

            document.getElementById('disp-day').innerText = state.day;
            document.getElementById('countdown-text').innerText = state.countdownText;
            document.getElementById('disp-title').innerText = data.title;
            document.getElementById('disp-text').innerText = data.text;
            document.getElementById('disp-img').src = data.image;
        }

            const newIdx = state.weekIndex + dir;
            if(newIdx >= 0 && newIdx < weeksData.length) { state.weekIndex = newIdx; renderView(); }

        // --- LÃGICA DE GITHUB API (CORREGIDA v4.2) ---
        async function pushToGitHub() {
            if (!ghConfig.user || !ghConfig.repo || !ghConfig.token) {
                return alert("Faltan datos de conexiÃ³n.");
            }

            const btn = document.getElementById('btn-push');
            const status = document.getElementById('status-msg');
            btn.disabled = true;
            status.innerText = "Conectando con GitHub...";

            try {
                const urlGet = `https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/index.html`;
                
                // 1. Pedir info del archivo a GitHub
                const res = await fetch(urlGet, {
                    headers: {
                        'Authorization': `token ${ghConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!res.ok) throw new Error("No se pudo conectar con el repositorio. Revisa usuario y token.");

                // 2. Decodificar la respuesta JSON (AquÃ­ estaba el error antes)
                const data = await res.json();
                const sha = data.sha;
                
                // 3. Decodificar el contenido Base64 del archivo
                // data.content es el HTML en base64. data.encoding es base64.
                // Quitamos saltos de lÃ­nea y decodificamos.
                const encodedContent = data.content.replace(/\n/g, ''); 
                const currentHtmlRaw = atob(encodedContent);

                // 4. Modificar el contenido HTML (Solo la variable weeksData)
                const newWeeksDataString = "const weeksData = " + JSON.stringify(weeksData, null, 4) + ";";
                
                if (!/const weeksData = \[([\s\S]*?)\];/.test(currentHtmlRaw)) {
                    throw new Error("No se encontrÃ³ la estructura weeksData en el archivo.");
                }

                const newHtmlContent = currentHtmlRaw.replace(/const weeksData = \[([\s\S]*?)\];/, newWeeksDataString + ";");

                // 5. Subir a GitHub
                const contentBase64 = utf8_to_b64(newHtmlContent);
                
                const putData = {
                    message: "Update content via Web App v4.2",
                    content: contentBase64,
                    sha: sha
                };

                const putRes = await fetch(urlGet, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${ghConfig.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(putData)
                });

                if(putRes.ok) {
                    status.innerText = "Â¡Guardado con Ã©xito!";
                    status.style.color = "green";
                    setTimeout(() => { status.innerText = ""; btn.disabled = false; }, 3000);
                } else {
                    throw new Error("Error al guardar: " + putRes.statusText);
                }

            } catch (error) {
                console.error(error);
                status.innerText = "Error: " + error.message;
                status.style.color = "red";
                btn.disabled = false;
            }
        }

        function utf8_to_b64(str) {
            return window.btoa(unescape(encodeURIComponent(str)));
        }
